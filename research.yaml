# ─────────────────────────────────────────────────────────────────────────────
# CONTRASTS
# Every contrast includes a real situation where the alternative wins.
# ─────────────────────────────────────────────────────────────────────────────
contrasts:
  - this: "Wood arrows (Port Orford cedar)"
    alternative: "Carbon or aluminum arrows"
    when_alt_wins: "High-volume competitive shooting where durability, weight tolerance, and consistent spine from shaft to shaft are paramount. Carbon arrows do not warp, absorb no moisture, and hold spine indefinitely. Aluminum arrows are inexpensive and consistent enough for beginners."
    when_this_wins: "Traditional aesthetic, off-the-shelf feel, repairability (a dinged point or split nock can be repaired at home with basic tools), and the tactile pleasure of a natural material that rewards careful building. Wood arrows are the correct choice for this curriculum's goal."

  - this: "Tapered shaft (nock and point ends tapered)"
    alternative: "Parallel shaft (uniform diameter)"
    when_alt_wins: "Parallel shafts are cheaper to source in bulk, and some builders prefer to custom-cut the taper angle themselves for tight control. Parallel shafts also allow re-tapering if the nock end splits — you remove a short section and re-taper."
    when_this_wins: "Pre-tapered shafts from Rose City or 3Rivers arrive ready to fletch and mount points without a separate tapering step, saving setup time in a small batch build like this curriculum's 24-arrow project."

  - this: "Nock insert (glue-on plastic nock)"
    alternative: "Self nock (cut into the wood)"
    when_alt_wins: "Self nocks are historically accurate, aesthetically aligned with primitive and period-correct builds, and require no additional hardware. For a re-enactment or primitive archery context, the self nock is the correct choice."
    when_this_wins: "Plastic nock inserts are more durable, consistent, and safe — a cracked self nock can shatter on release and drive a sliver into the draw hand. For target shooting 24 arrows repeatedly, glue-on nocks are the reliable practitioner choice."

  - this: "Right-wing feathers (for right-handed archer)"
    alternative: "Left-wing feathers"
    when_alt_wins: "If the fletching jig clamp is left-helical only, left-wing feathers are the correct match. Wing choice must match the clamp geometry — using the wrong wing with a helical clamp causes the feather to fight the twist and produces inconsistent adhesion."
    when_this_wins: "With a right-helical clamp (the most common configuration for right-handed archers), right-wing feathers seat naturally along the clamp's curvature, producing consistent helical contact and a secure bond."

  - this: "Parabolic cut feathers"
    alternative: "Shield cut feathers"
    when_alt_wins: "Shield-cut feathers provide more drag and faster arrow stabilization — useful when arrows are slightly under-spined or when shooting off a wide shelf where the cock feather must clear quickly. The extra surface area also corrects marginal form errors more aggressively."
    when_this_wins: "Parabolic-cut feathers produce slightly less drag and noise, fly a bit faster, and are the standard for well-tuned target arrows. When spine is correctly matched and form is consistent, the parabolic's lower profile is an advantage at longer target distances."

  - this: "Bareshaft tuning"
    alternative: "Paper tuning"
    when_alt_wins: "Paper tuning gives an immediate visual read on arrow orientation at the moment of bow clearance — useful for diagnosing form-related issues (finger pinch, torque) that bareshaft groups average out. It is also faster for a single-arrow diagnostic session."
    when_this_wins: "Bareshaft tuning on a traditional bow is more reliable than paper tuning because it averages out across a group of shots, reducing the influence of any single bad release. It also works at realistic distances (10–20 yards) rather than the 6-foot paper distance, which exaggerates minor form errors."

  - this: "Port Orford cedar"
    alternative: "Douglas fir (Surewood Shafts)"
    when_alt_wins: "Douglas fir produces heavier arrows for a given spine — 12–15+ GPI vs. 10–13 GPI for cedar — which can be desirable for archers wanting more downrange momentum or who shoot heavier bows where the extra mass dampens paradox oscillation. Surewood's Douglas fir is also highly consistent in spine grouping."
    when_this_wins: "Port Orford cedar is lighter, more widely available in a broader diameter range, easier to straighten with hand tools, and has the best modulus of elasticity of any commercial shaft wood — it recovers from paradox flex faster, which matters at longer target distances. It is the canonical choice for this curriculum."

# ─────────────────────────────────────────────────────────────────────────────
# AUTHORITIES
# Sources the field treats as credible. Reviewer uses this list to flag
# low-credibility citations in module reading lists.
# ─────────────────────────────────────────────────────────────────────────────
authorities:
  - name: "3Rivers Archery"
    url: "https://www.3riversarchery.com/"
    why: "The largest traditional archery specialty retailer in North America; their blog and PDFs are the most widely cited practical reference for wood arrow building outside of books. Their spine chart (woodchart.pdf) is a community standard."

  - name: "Rose City Archery"
    url: "https://www.rosecityarchery.com/"
    why: "The oldest continuously operating cedar arrow manufacturer in North America; their spine weight chart and FAQ pages are primary references for Port Orford cedar shaft selection."

  - name: "Surewood Shafts"
    url: "https://surewoodshafts.com/"
    why: "Premium Douglas fir shaft producer that sources and processes its own raw material; their spine selection guidance and build recommendations are a credible alternative to cedar-centric sources."

  - name: "Easton Archery"
    url: "https://eastonarchery.com/"
    why: "Although primarily a carbon/aluminum manufacturer, Easton's spine standard, FOC documentation, and arrow-selection methodology are the most widely adopted industry references and apply directly to wood arrow work."

  - name: "Stu Miller's Dynamic Spine Calculator"
    url: "https://heilakka.com/stumiller/"
    why: "The most cited free tool for matching wood arrow spine to a specific traditional bow setup. Developed from engineering principles and live-shooting data; used by a large fraction of the traditional archery community as the starting point before test shooting."

  - name: "The Traditional Bowyer's Bible (Volumes I–IV), edited by Jim Hamm"
    url: "https://www.3riversarchery.com/traditional-bowyers-bible-complete-set-of-books.html"
    why: "The canonical practitioner reference for the traditional archery craft. Volume 1 covers arrow making and fletching in depth; Volume 3 includes arrow construction from a historical perspective. Widely regarded as the most authoritative technical text in the field."

  - name: "Clay Hayes — Traditional Archery (YouTube)"
    url: "https://www.youtube.com/@ClayHayes"
    why: "A well-respected traditional archer and bowyer with freely accessible video documentation of arrow building, tuning, and traditional archery techniques. Recommended for visual learners as a companion to written sources."

