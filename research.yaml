topic: "Traditional wood target arrows — building, tuning, and maintenance"
goal: "Build, tune, and maintain ~24 beautiful traditional wood target arrows from parts. Be competent enough to assemble from parts, fletch, repair (broken arrows / tips / feathers), and tune to my bow. Teaching others is a future goal, not a near-term test."
created: "2026-05-01T00:00:00Z"
researcher_version: "0.4.17"

# ─────────────────────────────────────────────────────────────────────────────
# GLOSSARY
# Canonical definitions for all module-builders. Every term has at least one
# references[] link so readers have somewhere to go for additional depth.
# ─────────────────────────────────────────────────────────────────────────────
glossary:
  - term: "Spine"
    definition: "The measured stiffness of an arrow shaft; properly matched spine allows the arrow to flex correctly around the bow riser and recover to straight flight downrange."
    aliases: ["arrow stiffness", "spine weight"]
    references:
      - label: "Easton Archery — Making Sense of Arrow Spine"
        url: "https://eastonarchery.com/2014/07/making-sense-of-arrow-spine/"
      - label: "ShootingTime — Arrow Spine: Static, Dynamic, and How to Adjust"
        url: "https://shootingtime.com/archery/arrow-spine/"

  - term: "Static spine"
    definition: "A standardized laboratory measurement of shaft stiffness: the deflection in inches (×1000 = spine rating) when an 880-gram (1.94 lb) weight is suspended from the center of a shaft supported 28 inches apart."
    references:
      - label: "Easton Archery — Making Sense of Arrow Spine"
        url: "https://eastonarchery.com/2014/07/making-sense-of-arrow-spine/"
      - label: "ShootingTime — Arrow Spine: Static, Dynamic, and How to Adjust"
        url: "https://shootingtime.com/archery/arrow-spine/"

  - term: "Dynamic spine"
    definition: "The effective stiffness of an arrow during the actual shot — how it actually bends and recovers as it accelerates off the bow. Dynamic spine is influenced by shaft length, point weight, draw weight, bow design, and release style, and is what truly determines whether an arrow flies well."
    references:
      - label: "Easton Archery — Making Sense of Arrow Spine"
        url: "https://eastonarchery.com/2014/07/making-sense-of-arrow-spine/"
      - label: "Stu Miller's Dynamic Spine Calculator"
        url: "https://heilakka.com/stumiller/"

  - term: "AMO standard"
    definition: "The Archery Manufacturers Organization's legacy spine test protocol for wood arrows: a shaft supported at 26-inch centers with a 2-pound weight at the center; spine is reported as 26 divided by deflection in inches (e.g., 0.5\" deflection = 52-pound spine)."
    aliases: ["AMO spine standard", "wood arrow spine standard"]
    references:
      - label: "ShootingTime — Arrow Spine: Static, Dynamic, and How to Adjust"
        url: "https://shootingtime.com/archery/arrow-spine/"

  - term: "Draw weight"
    definition: "The peak force in pounds required to draw a bow to a specified draw length (commonly 28 inches for traditional bows). Draw weight is the primary input for spine selection — heavier bows require stiffer arrows."
    references:
      - label: "3Rivers Archery — Basic Longbow and Recurve Set-Up"
        url: "https://www.3riversarchery.com/blog/longbow-and-recurve-set-up/"
      - label: "Rose City Archery — Spine Weight Chart"
        url: "https://www.rosecityarchery.com/pages/spine-weight-recurve-longbow-compound-bow-chart"

  - term: "Draw length"
    definition: "The distance from the nocking point on the string to the back of the bow (the side facing away from the archer) at full draw. Draw length directly affects arrow length, which in turn affects dynamic spine — one inch longer weakens dynamic spine by approximately 5 pounds."
    references:
      - label: "Rose City Archery — Spine Weight Chart"
        url: "https://www.rosecityarchery.com/pages/spine-weight-recurve-longbow-compound-bow-chart"
      - label: "ShootingTime — Arrow Spine: Static, Dynamic, and How to Adjust"
        url: "https://shootingtime.com/archery/arrow-spine/"

  - term: "FOC (front-of-center)"
    definition: "The percentage of the arrow's total length by which the balance point lies forward of the physical midpoint of the shaft. Calculated as: FOC% = ((balance point − length/2) / length) × 100. Higher FOC improves downrange stability; for target traditional archery, 10–15% is a widely recommended range."
    aliases: ["front-of-center", "FOC balance"]
    references:
      - label: "Easton Archery — What Is FOC and How Does It Affect Arrow Flight"
        url: "https://eastonarchery.com/2014/06/foc/"
      - label: "Easton Archery — Simple Guidelines to Correct Arrow Balance"
        url: "https://eastonarchery.com/2022/06/the-simple-guidelines-to-correct-arrow-balance-foc/"
      - label: "Lancaster Archery Supply — What Is F.O.C. and How Does It Affect My Arrows"
        url: "https://lancasterarchery.com/blogs/guides-and-information/what-is-f-o-c-and-how-does-it-affect-my-arrows"

  - term: "GPI (grains per inch)"
    definition: "A weight-per-unit-length specification for arrow shafts, calculated as shaft weight in grains divided by shaft length in inches. Port Orford cedar at 11/32-inch diameter typically runs 10–15 GPI. GPI is used to compare shaft weights independently of length."
    aliases: ["grains per inch"]
    references:
      - label: "Archery360 — How to Calculate Arrow Weight and Why"
        url: "https://archery360.com/2018/06/14/how-to-calculate-arrow-weight-and-why/"
      - label: "BobLeeBows — Arrow GPI vs GPP"
        url: "https://bobleebows.com/arrows-critical-difference-gpi-gpp/"

  - term: "GPP (grains per pound)"
    definition: "The finished arrow's total weight in grains divided by the bow's draw weight in pounds. A midweight traditional arrow target is 6.5–8 GPP. Too light (under 5 GPP) risks bow damage and excessive noise; too heavy reduces trajectory and speed."
    aliases: ["grains per pound", "arrow weight ratio"]
    references:
      - label: "BobLeeBows — Arrow GPI vs GPP"
        url: "https://bobleebows.com/arrows-critical-difference-gpi-gpp/"
      - label: "Archery360 — How to Calculate Arrow Weight and Why"
        url: "https://archery360.com/2018/06/14/how-to-calculate-arrow-weight-and-why/"

  - term: "Archer's paradox"
    definition: "The phenomenon in which an arrow shot from a traditional bow — where the arrow must be offset to one side of the riser — nonetheless flies straight to the target because it flexes around the bow and recovers to the line of flight as it leaves the string. Correct spine matching is essential for this recovery to happen properly."
    references:
      - label: "Wikipedia — Archer's paradox"
        url: "https://en.wikipedia.org/wiki/Archer%27s_paradox"
      - label: "Northwoods Bowmen's Club — Archer's Paradox and Spine Stiffness"
        url: "https://northwoodsbowmensclub.org/archers-paradox-and-spine-stiffness/"

  - term: "Bareshaft tuning"
    definition: "A tuning method in which one or more unfleteched (bare) shafts are shot alongside fletched arrows at the same aiming point. Where the bare shaft impacts relative to the fletched group reveals spine match (horizontal deviation) and nocking point position (vertical deviation) before feather corrections can hide errors."
    references:
      - label: "Archery360 — How to Bare-Shaft Tune Your Recurve or Longbow"
        url: "https://archery360.com/2019/07/10/how-to-bare-shaft-tune-your-recurve-or-longbow/"
      - label: "3Rivers Archery — Basic Shaft and Arrow Tuning (PDF)"
        url: "https://www.3riversarchery.com/pdf/2011shafttuningchart.pdf"

  - term: "Paper tuning"
    definition: "A tuning method in which the archer shoots an arrow through a sheet of paper stretched taut on a frame. The tear pattern — bullet hole (ideal), tail-high, tail-low, tail-left, tail-right — indicates nocking point position and spine match at the moment the arrow passes through."
    references:
      - label: "Archery Supplier — Recurve Bow Tuning Guide: Bare Shaft, Paper & Walk-Back"
        url: "https://archerysupplier.com/recurve-bow-tuning-guide/"
      - label: "Archery360 — How to Bare-Shaft Tune Your Recurve or Longbow"
        url: "https://archery360.com/2019/07/10/how-to-bare-shaft-tune-your-recurve-or-longbow/"

  - term: "Walk-back tuning"
    definition: "A tuning method in which the archer shoots from progressively greater distances (e.g., 5, 10, 15, 20 yards) at the same vertical aiming point. Consistent vertical grouping with horizontal drift identifies centershot alignment errors that spine and nocking point corrections alone cannot fix."
    references:
      - label: "Archery Supplier — Recurve Bow Tuning Guide: Bare Shaft, Paper & Walk-Back"
        url: "https://archerysupplier.com/recurve-bow-tuning-guide/"
      - label: "Exo Mtn Gear — Comparing Bow Tuning Methods"
        url: "https://exomtngear.com/blogs/article/comparing-bow-tuning-methods"

  - term: "Footing"
    definition: "A short splice of dense hardwood (commonly hornbeam, osage orange, or bamboo) glued onto the point end of a softer-wood shaft. Footing reinforces the area most likely to split on target impact while preserving the shaft's overall flexibility and lighter weight."
    aliases: ["footed arrow", "point-end splice"]
    references:
      - label: "Legend Archery — Footed Arrow"
        url: "https://legendarchery.com/pages/footed-arrow"
      - label: "Wikipedia — Arrow"
        url: "https://en.wikipedia.org/wiki/Arrow"

  - term: "Nock taper"
    definition: "The 11-degree taper machined or cut into the back end of a wood shaft to accept a friction-fit glue-on plastic nock. The taper angle is standardized so that nocks from different manufacturers seat consistently."
    aliases: ["nock end taper", "11-degree taper"]
    references:
      - label: "Stickbow.com — Point and Nock Tapers"
        url: "http://www.stickbow.com/stickbow/arrowbuilding/tapertools.html"
      - label: "3Rivers Archery — Bearpaw Taper Tool"
        url: "https://www.3riversarchery.com/bearpaw-taper-tool.html"

  - term: "Point taper"
    definition: "The 5-degree taper cut into the front end of a wood shaft to accept a friction-fit glue-on field point or other tapered point. Secured with hot-melt adhesive, it allows point removal and replacement in the field."
    aliases: ["point-end taper", "5-degree taper"]
    references:
      - label: "Stickbow.com — Point and Nock Tapers"
        url: "http://www.stickbow.com/stickbow/arrowbuilding/tapertools.html"
      - label: "3Rivers Archery — Building Wood Arrows"
        url: "https://www.3riversarchery.com/blog/building-wood-arrows/"

  - term: "Self nock"
    definition: "A nock cut directly into the wood of the shaft itself — a simple saw cut, or a reinforced cut with a hardwood insert glued in — rather than a separate glued-on plastic nock. Traditional in aesthetic; requires careful grain alignment and periodic inspection for splits."
    references:
      - label: "TradTalk Forums — Self Nocks"
        url: "https://www.tradtalk.com/threads/self-nocks.142265/"
      - label: "TradTalk Forums — Tapered 11-degree shafts made into self nocks"
        url: "https://www.tradtalk.com/threads/tapered-11-degrees-shafts-made-into-self-nocks.143550/"

  - term: "Nock insert"
    definition: "A small plastic nock glued onto the tapered nock end of a wood shaft. More durable and consistent than a self nock; the standard choice for target arrows where reliability over aesthetics is preferred."
    aliases: ["glue-on nock", "plastic nock"]
    references:
      - label: "3Rivers Archery — Building Wood Arrows"
        url: "https://www.3riversarchery.com/blog/building-wood-arrows/"
      - label: "Bohning — The Nock Guide (PDF)"
        url: "https://www.bohning.com/wp-content/uploads/2019/09/Nock_Guide.pdf"

  - term: "Tapered shaft"
    definition: "An arrow shaft that is wider at one end than the other — typically tapered toward both the nock end and the point end from a wider center. The most common wood shaft profile for traditional target arrows; the taper creates the nock and point seating surfaces."
    references:
      - label: "3Rivers Archery — Building Wood Arrows"
        url: "https://www.3riversarchery.com/blog/building-wood-arrows/"
      - label: "3Rivers Archery — Arrow Shafting"
        url: "https://www.3riversarchery.com/buy/arrows/arrow-shafting"

  - term: "Parallel shaft"
    definition: "An arrow shaft with uniform diameter along its entire length. Parallel shafts require separate taper tools to cut nock and point seats; they are common in cedar shafts sold pre-tapered or left for the builder to taper to specification."
    references:
      - label: "3Rivers Archery — Port Orford Cedar Wood Arrow Shafts"
        url: "https://www.3riversarchery.com/port-orford-cedar-wood-arrow-shafts.html"

  - term: "Port Orford cedar"
    definition: "Chamaecyparis lawsoniana, a Pacific Northwest softwood regarded as the premier natural material for traditional arrow shafts. Valued for its consistently straight grain, high strength-to-weight ratio, and superior modulus of elasticity — it recovers quickly from the flex of the shot and returns to straight flight faster than most alternatives."
    aliases: ["POC", "Port Orford cedar shaft"]
    references:
      - label: "3Rivers Archery — Port Orford Cedar Wood Arrow Shafts"
        url: "https://www.3riversarchery.com/port-orford-cedar-wood-arrow-shafts.html"
      - label: "Wapiti Archery POC — Premium Weight Matched Port Orford Cedar Shafts"
        url: "https://wapitiarcherypoc.com/product/premium-weight-matched-port-orford-cedar-shafts/"

  - term: "Sitka spruce"
    definition: "Picea sitchensis, a Pacific Northwest softwood used for arrow shafts. Stiffer and lighter than Port Orford cedar for a given diameter; historically favored for flight arrows. Less common today but available from specialty shaft makers."
    references:
      - label: "Surewood Shafts — Choosing the Correct Spine"
        url: "https://surewoodshafts.com/pages/choosing-the-correct-spine"
      - label: "Wikipedia — Arrow"
        url: "https://en.wikipedia.org/wiki/Arrow"

  - term: "Douglas fir"
    definition: "Pseudotsuga menziesii, the primary material for Surewood Shafts' premium wood arrow shafts. Denser than Port Orford cedar, producing heavier arrows that some archers prefer for downrange momentum; requires disc-sander tapering rather than blade-style taper tools because of its grain structure."
    references:
      - label: "Surewood Shafts — Premium Wood Arrow Shafts"
        url: "https://surewoodshafts.com/collections/premium-arrow-shafts"
      - label: "ArcheryPast — Douglas Fir Hunter Grade Wood Arrow Shafts by Surewood Shafts"
        url: "https://archerypast.com/products/douglas-fir-hunter-grade-wood-arrow-shafts-by-surewood-shafts"

  - term: "Feather fletching"
    definition: "Natural feathers (typically turkey) used as arrow vanes. Feathers collapse on contact with the bow shelf and recover instantly, making them the preferred choice for off-the-shelf shooting on traditional bows. The rough side of the feather faces outward on the arrow shaft."
    aliases: ["natural feather", "turkey feather"]
    references:
      - label: "Wikipedia — Fletching"
        url: "https://en.wikipedia.org/wiki/Fletching"
      - label: "3Rivers Archery — Building Wood Arrows"
        url: "https://www.3riversarchery.com/blog/building-wood-arrows/"

  - term: "Left-wing vs right-wing feather"
    definition: "Feathers from the left wing of a bird curve opposite to those from the right wing. All three feathers on an arrow must come from the same wing; mixing wings causes the arrow to fight itself in flight. Convention: right-handed archers typically use right-wing feathers with right-handed helical clamps, and vice versa — though the actual direction of spin matters less than consistency."
    references:
      - label: "3Rivers Archery — Building Wood Arrows"
        url: "https://www.3riversarchery.com/blog/building-wood-arrows/"
      - label: "Wikipedia — Fletching"
        url: "https://en.wikipedia.org/wiki/Fletching"

  - term: "Shield cut"
    definition: "A feather fletching profile with a flat leading edge and a squared-off or slightly angled trailing tip, resembling a medieval shield in silhouette. Shield-cut feathers carry more surface area than parabolic cuts, providing more drag and faster stabilization — useful when spine is slightly off or when shooting off the shelf."
    references:
      - label: "ArcheryTalk — Fletching: Shield vs. Parabolic"
        url: "https://www.archerytalk.com/threads/fletching-shield-vs-parabolic.3521098/"
      - label: "Legend Archery — Parabolic Fletching"
        url: "https://legendarchery.com/pages/parabolic-fletching"

  - term: "Parabolic cut"
    definition: "A feather fletching profile with a smoothly curved leading and trailing edge — the classic symmetrical 'half-moon' shape. Less drag than shield cut, which preserves a few feet per second of velocity and produces slightly less noise. The standard profile for most target arrows."
    references:
      - label: "Legend Archery — Parabolic Fletching"
        url: "https://legendarchery.com/pages/parabolic-fletching"
      - label: "ArcheryTalk — Fletching: Shield vs. Parabolic"
        url: "https://www.archerytalk.com/threads/fletching-shield-vs-parabolic.3521098/"

  - term: "Helical fletching"
    definition: "Feathers or vanes attached with a deliberate twist (curvature) around the circumference of the shaft, creating maximum arrow spin in flight. Helical gives the best stabilization and tightest groups at distance; requires a fletching jig with a helical clamp. The standard choice for target wood arrows where speed loss is acceptable."
    aliases: ["helical offset"]
    references:
      - label: "RecurveArchery.net — Arrow Fletching Types and Offsets"
        url: "https://recurvearchery.net/arrow-fletching-types-and-offsets-improve-accuracy-and-stability/"
      - label: "Wikipedia — Fletching"
        url: "https://en.wikipedia.org/wiki/Fletching"

  - term: "Offset fletching"
    definition: "Feathers or vanes attached at a slight angle (2–3°) to the shaft axis without curving around the shaft. Offset induces spin and is easier to achieve with simpler jig clamps than true helical; a reasonable compromise between stabilization and setup simplicity."
    references:
      - label: "RecurveArchery.net — Arrow Fletching Types and Offsets"
        url: "https://recurvearchery.net/arrow-fletching-types-and-offsets-improve-accuracy-and-stability/"

  - term: "Fletching jig"
    definition: "A tool that holds the arrow shaft and a single feather clamp in a fixed geometric relationship — controlling the feather's position (distance from nock), rotation (120° spacing for three-fletch), and angle (straight, offset, or helical) — while the adhesive sets."
    references:
      - label: "3Rivers Archery — Fletching Templates"
        url: "https://www.3riversarchery.com/3rivers-fletching-templates.html"
      - label: "3Rivers Archery — Building Wood Arrows"
        url: "https://www.3riversarchery.com/blog/building-wood-arrows/"

  - term: "Glue-on field point"
    definition: "A tapered metal point with a conical bore that slides onto the 5-degree point taper and is secured with hot-melt adhesive. Field points are designed for target use — they punch into foam or burlap targets cleanly and pull out without damaging the shaft. Available in a range of weights (typically 75–125 grains for target use)."
    aliases: ["tapered field point", "hot-melt point"]
    references:
      - label: "Stickbow.com — Point and Nock Tapers"
        url: "http://www.stickbow.com/stickbow/arrowbuilding/tapertools.html"
      - label: "3Rivers Archery — Building Wood Arrows"
        url: "https://www.3riversarchery.com/blog/building-wood-arrows/"

  - term: "Dip tube"
    definition: "A length of PVC or metal tube long enough to fully submerge an arrow shaft. Used with liquid finishes (gasket lacquer, shellac, polyurethane) to coat the entire shaft in a single smooth, even pass. Multiple dip coats — with light sanding between — produce a durable moisture barrier."
    references:
      - label: "ArcheryTalk — Which Wooden Arrow Sealer and Why"
        url: "https://www.archerytalk.com/threads/which-wooden-arrow-sealer-why.2241698/"
      - label: "TradBow.com — Question About Wood Arrow Finishes"
        url: "https://tradbow.com/forums/topic/question-about-wood-arrow-finishes/"

  - term: "Sealer"
    definition: "A protective finish applied to a wood arrow shaft to prevent moisture absorption, which causes warping and spine drift. Common options: shellac (fast-drying, works under most adhesives), polyurethane (durable, available in wipe-on or dip formulations), and gasket lacquer (fast, high-gloss, traditional dip-tube choice)."
    aliases: ["shaft finish", "arrow finish"]
    references:
      - label: "ArcheryTalk — Arrow Building Finishes"
        url: "https://www.archerytalk.com/threads/arrow-building-finishes.2410074/"
      - label: "ArcheryTalk — Which Wooden Arrow Sealer and Why"
        url: "https://www.archerytalk.com/threads/which-wooden-arrow-sealer-why.2241698/"

  - term: "Cresting"
    definition: "Decorative bands of color painted on the shaft between the fletching and the crest (the solid base color band just forward of the fletching). Cresting historically identified arrows to their owner; today it is a mark of craftsmanship and personalisation. Applied with a spinning crester jig and fine liner brushes, then sealed with a clear topcoat."
    aliases: ["crown", "crest bands"]
    references:
      - label: "3Rivers Archery — How to Arrow Cresting"
        url: "https://www.3riversarchery.com/blog/how-to-arrow-cresting/"

  - term: "Serving"
    definition: "A tight wrapping of thread applied over the bowstring at the nocking point zone and at the loop ends. Center serving protects the string from arrow-nock wear; loop serving reinforces the loops against the limb tips. Nocking-point serving is also used to build a thread nock set as an alternative to a brass crimp-on nock."
    references:
      - label: "Legend Archery — Center Serving"
        url: "https://legendarchery.com/pages/center-serving"
      - label: "3Rivers Archery — How to Serve a Bow String"
        url: "https://www.3riversarchery.com/blog/how-to-serve-a-bow-string/"

  - term: "Brace height"
    definition: "The distance from the deepest part of the bow grip to the bowstring when the bow is strung and at rest. Brace height affects arrow paradox duration, finger clearance, and string slap risk. Most traditional longbows prefer 6–7 inches; recurves typically 7–9 inches depending on limb design."
    aliases: ["fistmele"]
    references:
      - label: "3Rivers Archery — Basic Longbow and Recurve Set-Up"
        url: "https://www.3riversarchery.com/blog/longbow-and-recurve-set-up/"
      - label: "BobLeeBows — Brace Height / Fistmele Settings"
        url: "https://bobleebows.com/brace-height-fistmele-settings/"

  - term: "Centershot"
    definition: "The horizontal alignment of the arrow rest or shelf relative to the bow's centerline. A bow is 'center shot' when the arrow's centerline passes through the bowstring's centerline; traditional bows are only partially cut-through and rely on archer's paradox to correct the remaining offset."
    references:
      - label: "3Rivers Archery — Basic Longbow and Recurve Set-Up"
        url: "https://www.3riversarchery.com/blog/longbow-and-recurve-set-up/"
      - label: "Wikipedia — Archer's paradox"
        url: "https://en.wikipedia.org/wiki/Archer%27s_paradox"

  - term: "Bow window"
    definition: "The cutaway section of the riser above the grip that allows the arrow to pass closer to the bow's centerline, reducing (but not eliminating) the offset that produces archer's paradox. The depth of the bow window directly affects how much spine correction is needed in shaft selection."
    references:
      - label: "3Rivers Archery — Basic Longbow and Recurve Set-Up"
        url: "https://www.3riversarchery.com/blog/longbow-and-recurve-set-up/"
      - label: "Wikipedia — Archer's paradox"
        url: "https://en.wikipedia.org/wiki/Archer%27s_paradox"

  - term: "Nocking point"
    definition: "The marked or built-up location on the bowstring where the arrow nock is consistently placed before each shot. Typically set approximately 1/2 inch above the arrow shelf (measured with a T-square). A brass crimp-on nock set or a tied thread serving are the two common methods."
    references:
      - label: "3Rivers Archery — Basic Longbow and Recurve Set-Up"
        url: "https://www.3riversarchery.com/blog/longbow-and-recurve-set-up/"
      - label: "60X Custom Strings — How to Set a Nocking Point With a Bow Square"
        url: "https://www.60xcustomstrings.com/blog/how-to-set-a-nocking-point-with-a-bow-square/"

