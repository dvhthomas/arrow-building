open_questions:
  - "The learner's bow draw weight and draw length are not specified. The designer and module-builders will need these to give concrete spine selection examples. The interview says 'bow with known draw weight on hand' — confirm the actual draw weight (e.g., 45#, 55#, 65# at 28\") and draw length before the designer sets the worked example."
  - "The learner's dominant hand (right- or left-handed) is not stated. Wing choice (right-wing vs left-wing feathers) and fletching jig clamp configuration depend on this. Module builders will default to right-handed unless the user specifies otherwise."
  - "The fletching jig model is not named. Clamp type (straight, offset, helical) and the degree of helical twist available affect which feather profile and wing are correct for this specific jig. If the learner knows the jig make/model, that determines a concrete fletching recommendation rather than a conditional one."
  - "Point weight is unspecified. For a target setup at typical indoor/outdoor ranges, 100–125 grain field points are common for cedar, but the correct weight depends on draw weight and desired FOC. The curriculum will use 100-grain as the worked example unless the user specifies otherwise."
  - "Shaft diameter preference (5/16\" vs 11/32\" vs 23/64\") is not stated. For most traditional target archers at 40–65#, 11/32\" is the default; 5/16\" is appropriate for lighter bows. This should be confirmed before the shaft-selection module is written to prevent a confusing conditional structure."
  - "The learner mentioned 'AI-generated reference imagery as a fallback' — this is acceptable per the interview, but the designer should note that AI imagery must be labeled as AI-generated in the curriculum. Free-use traditional archery imagery on Wikimedia Commons is available (search: fletching, arrow, traditional archery) and should be checked first."
