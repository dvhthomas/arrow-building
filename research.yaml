    last_checked: "2026-05-01"
    sections:
      - id: "straightening"
        anchor: "#straightening"
        why: "Describes shaft straightening technique before finishing — a step that catches warped shafts before you invest time in the rest of the build."
        excerpt: "Port Orford Cedar is one of the most willing to stay straight. The heel of the hand method involves locating bends, placing them against your palm, and stretching fibers while applying controlled force."
      - id: "fletching-wing"
        anchor: "#fletching"
        why: "Canonical statement on wing consistency: all feathers must come from the same wing."
        excerpt: "All feathers on an arrow must be from the same wing for proper flight. When mounting feathers on shafts, the feather should be placed with the trailing edge between 1/2\" and 5/8\" down from the nock, which allows for finger clearance."
      - id: "point-mounting"
        anchor: "#point-mounting"
        why: "Step-by-step on hot-melt point installation including surface prep."
        excerpt: "Use hot-melt adhesive applied via alcohol burner. Wipe out the inside of your point with alcohol-soaked cotton to remove manufacturing residue. Heat the point, glue, and shaft simultaneously, then rotate to ensure straight alignment before cooling."
      - id: "tapering"
        anchor: "#tapering"
        why: "Establishes the measurement sequence: measure from nock valley to desired length, add 3/4\"–7/8\" for the taper, then cut."
        excerpt: "Measure from the nock valley to desired length, then add 3/4\" to 7/8\" for the taper before cutting."

