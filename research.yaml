        anchor: "#brace-height"
        why: "Practical guidance on measuring and adjusting brace height — the first setup step before tuning."
        excerpt: "Brace height is the distance between the deepest portion of the bow's grip and the bowstring when the bow is at rest. Many modern longbows prefer around seven inches and recurves, depending on design, between seven and nine inches."
      - id: "nocking-point"
        anchor: "#nocking-point"
        why: "Standard starting nocking point position and adjustment logic (porpoising = nocking point; fishtailing = spine)."
        excerpt: "Most traditional bows like to have the nocking point approximately 1/2 inch above the shelf. Problems indicate correction needs: porpoising (vertical wagging) — adjust nocking point up or down until arrow flight straightens. Fishtailing (side-to-side motion) — indicates arrow spine mismatch, not a nocking point issue."
      - id: "spine-adjustment"
        anchor: "#spine"
        why: "Practical field-test for spine match using point weight variation before committing to a different shaft spine."
        excerpt: "Arrow too stiff (impacts left for right-handed archers): Add heavier points. Arrow too weak (impacts right): Try lighter points."

  - title: "Archery360 — How to Bare-Shaft Tune Your Recurve or Longbow"
    url: "https://archery360.com/2019/07/10/how-to-bare-shaft-tune-your-recurve-or-longbow/"
    authority: "well-known-third-party"
    last_checked: "2026-05-01"
    sections:
      - id: "bareshaft-what-reveals"
        anchor: "#what-it-reveals"
        why: "Defines what bareshaft tuning actually tests — the key distinction between vertical (nocking point) and horizontal (spine) errors."
        excerpt: "Bare-shaft tuning reveals whether your arrow spine matches your setup and whether your nocking point is correctly positioned. Fletching masks imperfections, while bare shafts expose them. If your bare shaft hits low, your nocking point is too high. If your bare shaft hits high, your nocking point is too low."
      - id: "bareshaft-horizontal"
        anchor: "#horizontal-adjustments"
        why: "Spine match diagnosis from horizontal impact: left = stiff, right = weak (for right-handed archers)."
        excerpt: "Left impact = spine too stiff. Right impact = spine too weak. (Reverse for left-handed archers.)"

  - title: "Easton Archery — What Is FOC and How Does It Affect Arrow Flight"
    url: "https://eastonarchery.com/2014/06/foc/"
    authority: "manufacturer"
    last_checked: "2026-05-01"
    sections:
      - id: "foc-definition"
        anchor: "#what-is-foc"
        why: "Canonical manufacturer definition of FOC and how to calculate it."
        excerpt: "Front-of-center (FOC) describes the percentage of an arrow's total weight positioned in the front half of the shaft. Higher FOC produces stable flight but causes the arrow to lose trajectory quickly and nose-dive. Easton recommends 10–15% FOC for hunting setups to achieve optimal accuracy."
      - id: "foc-calculation"
        anchor: "#calculation"
        why: "Step-by-step calculation method module-builders can reproduce for the learner."
        excerpt: "Divide total arrow length by 2 to find the midpoint. Locate the physical balance point (where arrow balances perfectly). Subtract the midpoint measurement from the balance point. Multiply by 100. Divide by total arrow length."

  - title: "Easton Archery — Making Sense of Arrow Spine"
    url: "https://eastonarchery.com/2014/07/making-sense-of-arrow-spine/"
    authority: "manufacturer"
    last_checked: "2026-05-01"
    sections:
      - id: "static-spine-def"
        anchor: "#static-spine"
        why: "Manufacturer-authoritative definition of the static spine measurement standard used on all commercial shaft labeling."
        excerpt: "An 880-gram (1.94 lbs.) weight is suspended from the center of the arrow supported 28 inches apart. The resulting deflection in inches, multiplied by 1000, determines the spine rating."
      - id: "dynamic-spine-def"
        anchor: "#dynamic-spine"
        why: "Explains why static spine is a starting point but dynamic spine is what actually matters during a shot."
        excerpt: "Dynamic spine describes how an arrow responds to a bow's stored energy during actual shooting. Because countless variables affect this behavior, manufacturers typically don't use this measurement for commercial spine ratings. Shooters can adjust dynamic spine by modifying draw weight, point weight, string material, vane weight, or arrow length."

  - title: "Stu Miller's Dynamic Spine Calculator"
    url: "https://heilakka.com/stumiller/"
    authority: "community-practitioner-tool"
    last_checked: "2026-05-01"
    sections:
      - id: "calculator-purpose"
        anchor: "#overview"
        why: "The most widely cited free tool for matching wood arrow spine to a specific traditional bow. Used as the starting point before test-shooting."
        excerpt: "The calculator was developed to aid the traditional archer in defining the appropriate arrow setup to match a given bow design. The formulas are derived primarily from modern deflex/reflex longbow and recurve designs based on actual shooting experience coupled with basic engineering principles."
      - id: "calculator-methodology"
        anchor: "#how-to-use"
        why: "Explains the personal form factor (PFF) calibration step — essential to get accurate results rather than treating the output as absolute."
        excerpt: "The absolute best way to start with Stu's is to input known bow/arrow specs that are already tuned and fly well for you, then alter the Personal Form Factor until the numbers are within 2 pounds, and keep the PFF constant throughout your inputs of other arrows and bows."

  - title: "Rose City Archery — Spine Weight Chart (Recurve, Longbow, Compound)"
    url: "https://www.rosecityarchery.com/pages/spine-weight-recurve-longbow-compound-bow-chart"
    authority: "manufacturer"
    last_checked: "2026-05-01"
    sections:
      - id: "poc-spine-natural"
        anchor: "#port-orford-cedar"
        why: "Explains why Port Orford cedar spine is a natural property of the wood — it cannot be manufactured to spec the way aluminum or carbon can."
        excerpt: "The spine weight of Port Orford Cedar Arrows is virtually natural and cannot be 'manufactured'. The spine weight is solely determined by the diameter of the shaft and the density of the Port Orford Cedar wood."
      - id: "spine-per-inch"
        anchor: "#adjustment"
        why: "Standard per-inch spine adjustment rule used when cutting shafts to a non-standard draw length."
        excerpt: "For cutting to your personal draw length you will need to deduct 5 lbs (1 spine weight increment lower) for every inch cut off below 28 inches. For every inch above 28 you will need to add 5 lbs or 1 spine weight increment per inch."

  - title: "Wikipedia — Archer's paradox"
    url: "https://en.wikipedia.org/wiki/Archer%27s_paradox"
    authority: "well-known-third-party"
    last_checked: "2026-05-01"
    sections:
      - id: "paradox-definition"
        anchor: "#description"
        why: "The clearest freely-available definition of archer's paradox and its relationship to spine matching."
        excerpt: "The paradox is that an arrow will fly in a straight line to a target when it starts off pointing away from the target. In order to be accurate, an arrow must have the correct stiffness, or 'dynamic spine', to flex out of the way of the bow and to return to the correct path as it leaves the bow."
      - id: "traditional-vs-modern"
        anchor: "#traditional-vs-modern"
        why: "Distinguishes traditional bow behavior (where paradox is real) from cut-away-riser target bows (where it is absent) — directly relevant to why wood arrow spine matching is more demanding."
        excerpt: "Modern target bows often have risers with an eccentrically cutout arrow window; being centre shot, these bows do not exhibit any paradoxical behaviour as the arrow is always pointing visually along its line of flight."

  - title: "Wikipedia — Fletching"
    url: "https://en.wikipedia.org/wiki/Fletching"
    authority: "well-known-third-party"
    last_checked: "2026-05-01"
    sections:
      - id: "fletching-definition"
        anchor: "#definition"
        why: "Reference definition of fletching and the three-feather configuration standard for traditional arrows."
        excerpt: "Fletching refers to the fin-shaped aerodynamic stabilization device attached on arrows, crossbow bolts, darts, and javelins. Conventionally, fletching consists of three matched half-feathers positioned equally around the arrow's circumference."
      - id: "wing-consistency"
        anchor: "#feather-orientation"
        why: "Authoritative statement on why all feathers must come from the same wing."
        excerpt: "A right handed archer should shoot a right winged feather and right handed helical, and a left handed archer should use the opposite. Modern slow-motion analysis reveals that the arrow does not begin to spin until it is well past the riser, making consistency in fletching more critical than theoretical preferences."

  - title: "3Rivers Archery — How to Arrow Cresting"
    url: "https://www.3riversarchery.com/blog/how-to-arrow-cresting/"
    authority: "well-known-retailer-with-educational-content"
    last_checked: "2026-05-01"
    sections:
      - id: "cresting-definition"
        anchor: "#what-is-cresting"
        why: "Context for why traditional archers crest arrows — identification historically, personal expression today."
        excerpt: "Cresting is the practice of decorating arrows with painted designs. Historically used for arrow identification, it has become a way of personal expression among modern archers."
      - id: "cresting-technique"
        anchor: "#technique"
        why: "The key craft warning: thin coats and patience matter more than any particular color scheme."
        excerpt: "The easiest way to mess up an arrow is to try and hurry through the cresting. Apply wider bands first, then move to thinner bands, with thin separator lines between colors to give the crest a clean finished look."

  - title: "Legend Archery — Footed Arrow"
    url: "https://legendarchery.com/pages/footed-arrow"
    authority: "well-known-third-party"
    last_checked: "2026-05-01"
    sections:
      - id: "footing-definition"
        anchor: "#definition"
        why: "Clear definition of what a footed arrow is and the trade-offs: durability vs added weight and construction complexity."
        excerpt: "A footed arrow features a reinforcing piece of hardwood attached to its front end, typically made from materials like hornbeam or bamboo. By reinforcing the area most likely to break, the arrow is more likely to survive impact, while maintaining overall flexibility and lighter weight."
      - id: "footing-tradeoffs"
        anchor: "#trade-offs"
        why: "Honest framing of when footing is and is not worth the extra effort."
        excerpt: "Footed arrows suit archers prioritizing durability and accuracy over convenience and cost. Added weight affects speed and trajectory. Higher production costs. Requires specialized skill to construct properly."

